$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/items/gem.schema.yaml
title: Gem
description: A gem that can be socketed into equipment
type: object
properties:
  type:
    type: string
    const: gem
  name:
    description: The display name of the gem
    type: string
  quality:
    description: The quality tier of the gem
    $ref: item-quality.schema.yaml
required:
  - type
  - name
  - quality
additionalProperties: false
