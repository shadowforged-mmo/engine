$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/items/armor-item.schema.yaml
title: Armor Item
description: An armor item
type: object
properties:
  type:
    type: string
    const: armor
  name:
    description: The display name of the armor piece
    type: string
  quality:
    description: The quality tier of the armor
    $ref: item-quality.schema.yaml
  slot:
    description: The equipment slot this armor occupies
    $ref: armor-slot.schema.yaml
  sockets:
    description: Number of socketable slots
    type: integer
    minimum: 0
  model:
    description: The armor model used to render this piece
    $ref: ../armor-model.schema.yaml
  bonuses:
    description: Stat bonuses granted while this armor piece is equipped
    $ref: bonuses.schema.yaml
required:
  - type
  - name
  - quality
  - slot
  - sockets
  - model
additionalProperties: false
