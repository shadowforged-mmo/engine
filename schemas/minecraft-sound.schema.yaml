$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/minecraft-sound.schema.yaml
title: Minecraft Sound
description: A sound from the Minecraft sound namespace
type: object
properties:
  type:
    type: string
    const: minecraft
  name:
    description: The Minecraft sound name
    type: string
  source:
    description: The sound source category
    type: string
    enum: [master, music, record, weather, block, hostile, neutral, player, ambient, voice]
  volume:
    description: The volume of the sound
    type: number
    minimum: 0.0
    default: 1.0
  pitch:
    description: The pitch of the sound
    type: number
    exclusiveMinimum: 0.0
    default: 1.0
required:
  - type
  - name
additionalProperties: false
