$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/quests/quest.schema.yaml
title: Quest
description: A quest definition
type: object
properties:
  name:
    description: The display name of the quest
    type: string
  level:
    description: The minimum level required to start this quest
    type: integer
    minimum: 1
  prerequisites:
    description: Quests that must be completed before this quest can be started
    type: array
    items:
      $ref: ../quest-reference.schema.yaml
  objectives:
    description: Objectives that must be completed to finish the quest
    type: array
    items:
      $ref: objectives/objective.schema.yaml
  rewards:
    description: Rewards granted upon quest completion
    $ref: quest-rewards.schema.yaml
required:
  - name
  - level
additionalProperties: false
