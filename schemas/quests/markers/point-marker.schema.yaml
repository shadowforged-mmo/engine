$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/quests/markers/point-marker.schema.yaml
title: Point Marker
description: A point marker on the map
type: object
properties:
  type:
    type: string
    const: point
  instance:
    description: The instance this marker is in
    $ref: "../../instance-reference.schema.yaml"
  point:
    description: The [x, z] position of the marker
    $ref: "../../vector2.schema.yaml"
required:
  - type
  - instance
  - point
additionalProperties: false
