$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/quests/objectives/slay-character-objective.schema.yaml
title: Slay Character Objective
description: An objective requiring the player to slay a number of characters
type: object
properties:
  type:
    type: string
    const: slay_character
  goal:
    description: Number of characters to slay
    type: integer
    minimum: 1
    default: 1
  markers:
    description: Map markers showing where to find targets
    type: array
    items:
      $ref: ../markers/marker.schema.yaml
  character:
    description: The character to slay
    $ref: ../../character-reference.schema.yaml
required:
  - type
  - markers
  - character
additionalProperties: false
