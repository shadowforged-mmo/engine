$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/quests/objectives/collect-item-objective.schema.yaml
title: Collect Item Objective
description: An objective requiring the player to collect a number of items
type: object
properties:
  type:
    type: string
    const: collect_item
  goal:
    description: Number of items to collect
    type: integer
    minimum: 1
  markers:
    description: Map markers showing where to find items
    type: array
    items:
      $ref: "../markers/marker.schema.yaml"
  item:
    description: The item to collect
    $ref: "../../item-reference.schema.yaml"
required:
  - type
  - goal
  - markers
  - item
additionalProperties: false
