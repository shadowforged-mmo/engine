$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/quests/quest-reward-item.schema.yaml
title: Quest Reward Item
description: An item rewarded for completing a quest
type: object
properties:
  item:
    description: The item to award
    $ref: ../item-reference.schema.yaml
  quantity:
    description: Number of items to award
    type: integer
    minimum: 1
    default: 1
  player_classes:
    description: If specified, only players of these classes receive this reward
    type: array
    items:
      $ref: ../class-reference.schema.yaml
required:
  - item
additionalProperties: false
