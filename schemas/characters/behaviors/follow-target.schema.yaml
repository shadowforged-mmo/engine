$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/characters/behaviors/follow-target.schema.yaml
title: Follow Target
description: Pathfinds toward the current target until within acceptance radius
type: object
properties:
  type:
    type: string
    const: follow_target
  acceptance_radius:
    description: Distance at which the character stops and considers the target reached
    type: number
    minimum: 0.0
  max_distance:
    description: Distance beyond which the character gives up following
    type: number
    minimum: 0.0
  speed:
    description: Movement speed in blocks per second
    type: number
    exclusiveMinimum: 0.0
required:
  - type
  - acceptance_radius
  - max_distance
  - speed
additionalProperties: false