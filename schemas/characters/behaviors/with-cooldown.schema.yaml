$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/characters/behaviors/with-cooldown.schema.yaml
title: With Cooldown
description: Executes the child behavior, then prevents re-execution for a cooldown period
type: object
properties:
  type:
    type: string
    const: with_cooldown
  child:
    $ref: behavior.schema.yaml
  cooldown:
    description: Cooldown duration in seconds
    type: integer
    minimum: 0
required:
  - type
  - child
  - cooldown
additionalProperties: false