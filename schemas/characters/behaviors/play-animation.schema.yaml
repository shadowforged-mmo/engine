$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/characters/behaviors/play-animation.schema.yaml
title: Play Animation
description: Plays a named animation on the character's Blockbench model
type: object
properties:
  type:
    type: string
    const: play_animation
  animation:
    description: The name of the animation to play
    type: string
required:
  - type
  - animation
additionalProperties: false