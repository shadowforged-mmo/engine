$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/characters/behaviors/is-target-in-range.schema.yaml
title: Is Target In Range
description: Succeeds if the target's distance is within [min_distance, max_distance]
type: object
properties:
  type:
    type: string
    const: is_target_in_range
  min_distance:
    description: Minimum distance to the target in blocks
    type: number
    minimum: 0.0
    default: 0.0
  max_distance:
    description: Maximum distance to the target in blocks
    type: number
    minimum: 0.0
required:
  - type
additionalProperties: false