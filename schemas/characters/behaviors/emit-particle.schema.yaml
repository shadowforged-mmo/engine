$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/characters/behaviors/emit-particle.schema.yaml
title: Emit Particle
description: Spawns a particle effect at the character's position
type: object
properties:
  type:
    type: string
    const: emit_particle
  particle:
    description: The Minecraft particle type name
    type: string
  offset:
    description: Offset from the character's position in local space
    $ref: "../../vector3.schema.yaml"
required:
  - type
  - particle
additionalProperties: false