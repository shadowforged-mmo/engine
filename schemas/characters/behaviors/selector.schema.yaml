$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/characters/behaviors/selector.schema.yaml
title: Selector
description: Executes children in order until one succeeds
type: object
properties:
  type:
    type: string
    const: selector
  children:
    type: array
    items:
      $ref: behavior.schema.yaml
    minItems: 1
required:
  - type
  - children
additionalProperties: false