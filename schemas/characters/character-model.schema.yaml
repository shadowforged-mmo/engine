$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/character-model.schema.yaml
title: Character Model
description: The visual model used to render a character
oneOf:
  - $ref: "#/$defs/BlockbenchCharacterModel"
  - $ref: "#/$defs/SkinCharacterModel"
  - $ref: "#/$defs/EntityCharacterModel"
$defs:
  BlockbenchCharacterModel:
    type: object
    title: Blockbench Character Model
    description: A custom 3D model created in Blockbench
    properties:
      type:
        type: string
        const: blockbench
      scale:
        description: Uniform scale factor applied to the model
        type: number
        exclusiveMinimum: 0.0
        default: 1.0
      model:
        description: The Blockbench model reference
        $ref: "model-reference.schema.yaml"
    required:
      - type
      - model
    additionalProperties: false
  SkinCharacterModel:
    type: object
    title: Skin Character Model
    description: A player-skin-based humanoid model
    properties:
      type:
        type: string
        const: skin
      skin:
        description: The skin reference
        $ref: "skin-reference.schema.yaml"
      equipment:
        description: Equipment worn on the model
        $ref: "#/$defs/CharacterModelEquipment"
    required:
      - type
      - skin
    additionalProperties: false
  EntityCharacterModel:
    type: object
    title: Entity Character Model
    description: A vanilla Minecraft entity type used as the model
    properties:
      type:
        type: string
        const: entity
      entity:
        description: The Minecraft entity type reference
        $ref: "minecraft-reference.schema.yaml"
      equipment:
        description: Equipment worn on the model
        $ref: "#/$defs/CharacterModelEquipment"
    required:
      - type
      - entity
    additionalProperties: false
  CharacterModelEquipment:
    type: object
    description: Items and armor equipped on a character model
    properties:
      main_hand:
        description: Item model held in the main hand
        $ref: "item-model-reference.schema.yaml"
      off_hand:
        description: Item model held in the off hand
        $ref: "item-model-reference.schema.yaml"
      feet:
        description: Armor model worn on the feet slot
        $ref: "armor-model.schema.yaml"
      legs:
        description: Armor model worn on the legs slot
        $ref: "armor-model.schema.yaml"
      chest:
        description: Armor model worn on the chest slot
        $ref: "armor-model.schema.yaml"
      head:
        description: Armor model worn on the head slot
        $ref: "armor-model.schema.yaml"
    additionalProperties: false
