$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/blockbench-armor-model.schema.yaml
title: Blockbench Armor Model
description: A custom armor appearance using a Blockbench item model
type: object
properties:
  type:
    type: string
    const: blockbench
  model:
    description: The Blockbench item model reference
    $ref: "item-model-reference.schema.yaml"
required:
  - type
  - model
additionalProperties: false
