$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/quest-progress.schema.yaml
title: Quest Progress
description: Quest progress state
type: object
properties:
  completed:
    description: References to completed quests
    type: array
    items:
      $ref: quest-reference.schema.yaml
  tracked:
    description: References to currently tracked quests
    type: array
    items:
      $ref: quest-reference.schema.yaml
  objectives:
    description: Progress for each active quest's objectives
    type: array
    items:
      $ref: quest-objective-progress.schema.yaml
required:
  - completed
  - tracked
  - objectives
additionalProperties: false
