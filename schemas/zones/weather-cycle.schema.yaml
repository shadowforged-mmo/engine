$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/zones/weather-cycle.schema.yaml
title: Weather
description: A single entry in a zone's weather cycle
type: object
properties:
  duration:
    description: Duration of this weather state in seconds
    type: number
    exclusiveMinimum: 0.0
  weather:
    description: The weather state
    type: string
    enum: [clear, rain, thunder]
required:
  - duration
  - weather
additionalProperties: false
