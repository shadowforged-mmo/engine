$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shadowforgedmmo.com/schemas/skins/skin.schema.yaml
title: Skin
description: A Minecraft player skin with textures and signature data
type: object
properties:
  textures:
    description: Base64-encoded textures property value
    type: string
  signature:
    description: Base64-encoded signature of the textures property
    type: string
required:
  - textures
  - signature
additionalProperties: false
